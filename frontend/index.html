<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Slowed + Reverb</title>
  <!-- Meta viewport para responsividade -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page-wrapper">
    <main class="container">
      <h1>Slowed + Reverb</h1>
      <p>Transform any audio/song into slowed + reverb</p>

<div class="speed-control">
  <label for="speedRange">Speed</label>
  <div class="slider-group">
    <input 
      type="range" 
      id="speedRange" 
      min="0.5" 
      max="2.0" 
      step="0.05" 
      value="0.85"
    />

    <input
      type="number"
      id="speedInput"
      min="0.5"
      max="2.0"
      step="0.01"
      value="0.85"
    />
    <span class="multiplier">x</span>
  </div>
</div>

      <!-- Upload -->
      <label class="upload-btn">
        <span class="btn-icon"></span>
        Choose audio
        <input
          type="file"
          id="file-input"
          name="audio"
          accept="audio/*"
          hidden
        />
      </label>

      <!-- Nome do arquivo -->
      <span id="file-name"></span>

      <!-- Confirm button -->
      <button type="button" id="confirm-btn" class="confirm-btn hidden">Confirm?</button>

      <!-- Download -->
      <a
        id="download-btn"
        class="download-btn hidden"
      >
        Download Processed Audio
      </a>

      <!-- Spinner -->
      <div id="loading" class="loading hidden">
        <div class="spinner"></div>
        <p>Processing audio...</p>
      </div>
    </main>

    <footer class="footer">
      Developed by Ezequiel Borges
    </footer>
  </div>

  <script src="main.js"></script>
</body>
</html>
