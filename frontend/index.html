<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Slowed + Reverb</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Roboto:wght@400;500;700&display=swap"
    rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <div class="bg-orb orb-3"></div>

  <div class="page-wrapper">
    <main class="container">
      <h1>Slowed + Reverb</h1>
      <p class="subtitle">
        Transform any audio into a slowed/speed + reverb version
      </p>

      <section class="speed-control">
        <div class="section-label-row">
          <label for="speedRange">Speed</label>
          <span class="speed-hint">0.5x to 2.0x</span>
        </div>

        <div class="slider-group">
          <input type="range" id="speedRange" min="0.5" max="2.0" step="0.05" value="0.85" />

          <div class="speed-number-wrap">
            <input
              type="text"
              id="speedInput"
              value="0.85"
              inputmode="decimal"
              autocomplete="off"
              spellcheck="false"
              aria-label="Playback speed" />
            <span class="multiplier">x</span>
          </div>
        </div>

        <div class="speed-presets">
          <button type="button" class="preset-btn active" data-speed="0.85">
            Slowed
          </button>
          <button type="button" class="preset-btn" data-speed="0.70">
            Slowed +
          </button>
          <button type="button" class="preset-btn" data-speed="1.15">
            Speed up
          </button>
        </div>
      </section>

      <section class="upload-section" id="drop-zone">
        <label class="upload-btn" for="file-input">
          <span class="btn-icon">&#9835;</span>
          Choose audio
        </label>
      </section>

      <div class="drag-hint">
        Or drag and drop your file here
      </div>

      <input type="file" id="file-input" name="audio" accept="audio/*" hidden />

      <section id="process-card" class="process-card hidden">
        <div class="process-card-top">
          <div class="file-visual">
            <div class="file-icon">&#9835;</div>
          </div>

          <div class="file-meta">
            <h3 id="file-name">No file selected</h3>
            <p id="file-size">-- MB</p>
          </div>

          <button type="button" id="play-btn" class="play-btn hidden" aria-label="Play preview">
            &#9654;
          </button>

          <button type="button" id="remove-file-btn" class="close-file-btn" aria-label="Remove selected file">
            &times;
          </button>
        </div>

        <div class="process-status">
          <div class="status-row">
            <span id="status-text">Ready to process</span>
            <span id="status-percent">0%</span>
          </div>

          <p id="status-detail" class="status-detail">
            Upload starts when you click process.
          </p>

          <div class="progress-track">
            <div class="progress-fill" id="progress-fill"></div>
          </div>
        </div>

        <button type="button" id="confirm-btn" class="confirm-btn hidden">
          Process audio
        </button>

        <a id="download-btn" class="download-btn hidden">
          Download processed audio
        </a>
      </section>
    </main>

    <section class="history-section" id="history-section">
      <h3>Recent</h3>
      <div id="history-list" class="history-list"></div>
    </section>

    <footer class="footer">
      Developed by Ezequiel Borges
    </footer>
  </div>

  <script src="main.js"></script>
</body>

</html>
